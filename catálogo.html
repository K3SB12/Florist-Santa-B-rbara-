<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | Floristería Santa Bárbara</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sb: { green: '#2D5A3D', 'green-light': '#4A7C59', cream: '#F5F1E8', rose: '#C41E3A', 'rose-soft': '#E8B4B8', gold: '#D4AF37', dark: '#1A1A1A' }
                    },
                    fontFamily: { serif: ['Playfair Display', 'serif'], sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    
    <style>
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .filtro-activo { background-color: #2D5A3D !important; color: white !important; border-color: #2D5A3D !important; }
    </style>
</head>
<body class="font-sans bg-sb-cream text-sb-dark">
    
    <!-- Header -->
    <header class="fixed w-full top-0 z-50 bg-white/95 backdrop-blur-md shadow-sm" id="header">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16 md:h-20">
                <a href="index.html" class="flex items-center gap-3">
                    <span class="text-3xl">🌸</span>
                    <div>
                        <h1 class="font-serif text-xl md:text-2xl font-bold text-sb-green">Santa Bárbara</h1>
                        <p class="text-xs text-gray-500 hidden sm:block">Flores frescas • Costa Rica</p>
                    </div>
                </a>
                
                <nav class="hidden md:flex items-center gap-8">
                    <a href="index.html" class="text-gray-600 hover:text-sb-green font-medium">Inicio</a>
                    <a href="catalogo.html" class="text-sb-green font-medium">Catálogo</a>
                    <a href="index.html#contacto" class="text-gray-600 hover:text-sb-green font-medium">Contacto</a>
                </nav>
                
                <div class="flex items-center gap-4">
                    <a href="carrito.html" class="relative p-2 text-gray-600 hover:text-sb-green transition-colors">
                        <i class="fas fa-shopping-bag text-xl"></i>
                        <span id="cartCount" class="absolute -top-1 -right-1 bg-sb-rose text-white text-xs w-5 h-5 rounded-full flex items-center justify-center opacity-0 transition-opacity">0</span>
                    </a>
                    <button onclick="toggleMenu()" class="md:hidden p-2 text-gray-600 hover:text-sb-green">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <div id="mobileMenu" class="hidden md:hidden bg-white border-t">
            <div class="px-4 py-3 space-y-2">
                <a href="index.html" class="block py-2 text-gray-600 hover:text-sb-green">Inicio</a>
                <a href="catalogo.html" class="block py-2 text-sb-green font-medium">Catálogo</a>
                <a href="carrito.html" class="block py-2 text-gray-600 hover:text-sb-green">Carrito</a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="pt-24 pb-16 min-h-screen">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            
            <!-- Debug info (ocultar en producción) -->
            <div id="debugInfo" class="hidden bg-yellow-100 border border-yellow-400 text-yellow-800 px-4 py-3 rounded mb-4 text-sm"></div>
            
            <!-- Título y búsqueda -->
            <div class="mb-8">
                <h2 class="font-serif text-3xl md:text-4xl text-sb-dark mb-4">Nuestro Catálogo</h2>
                <div class="flex flex-col md:flex-row gap-4">
                    <div class="relative flex-1">
                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="busqueda" placeholder="Buscar rosas, arreglos, plantas..." 
                               class="w-full pl-12 pr-4 py-3 rounded-xl border-2 border-gray-200 focus:border-sb-green focus:outline-none"
                               oninput="filtrarProductos()">
                    </div>
                    <select id="ordenar" onchange="filtrarProductos()" class="px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-sb-green focus:outline-none bg-white">
                        <option value="relevancia">Ordenar por relevancia</option>
                        <option value="precio-menor">Precio: menor a mayor</option>
                        <option value="precio-mayor">Precio: mayor a menor</option>
                        <option value="nombre">Nombre A-Z</option>
                    </select>
                </div>
            </div>
            
            <!-- Filtros de categoría -->
            <div class="flex gap-3 overflow-x-auto pb-4 mb-8 scrollbar-hide" id="filtrosCategoria">
                <button onclick="setCategoria('todos')" id="btn-todos" class="filtro-btn px-6 py-3 rounded-full border-2 border-sb-green bg-sb-green text-white font-medium whitespace-nowrap transition-all">
                    Todos
                </button>
            </div>
            
            <!-- Contador de resultados -->
            <p class="text-gray-600 mb-6" id="contadorResultados">Cargando...</p>
            
            <!-- Grid de productos -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="productosGrid">
                <!-- Skeleton loading inicial -->
                <div class="skeleton rounded-2xl h-96"></div>
                <div class="skeleton rounded-2xl h-96"></div>
                <div class="skeleton rounded-2xl h-96"></div>
                <div class="skeleton rounded-2xl h-96"></div>
            </div>
            
            <!-- No resultados -->
            <div id="sinResultados" class="hidden text-center py-16">
                <i class="fas fa-search text-6xl text-gray-300 mb-4"></i>
                <h3 class="font-serif text-2xl text-gray-600 mb-2">No encontramos productos</h3>
                <p class="text-gray-500">Intenta con otra búsqueda o categoría</p>
                <button onclick="resetearFiltros()" class="mt-4 text-sb-green underline font-medium">Ver todos los productos</button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-sb-dark text-white py-8">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-gray-400">&copy; 2024 Floristería Santa Bárbara</p>
        </div>
    </footer>

    <a href="https://wa.me/50686053613" target="_blank" class="fixed bottom-6 right-6 z-50 bg-green-500 hover:bg-green-600 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-lg transition-transform hover:scale-110">
        <i class="fab fa-whatsapp text-2xl"></i>
    </a>

    <script>
        // ==========================================
        // CONFIGURACIÓN Y VARIABLES GLOBALES
        // ==========================================
        
        const CONFIG = {
            whatsapp: '50686053613',
            // Intentar múltiples rutas posibles para el JSON
            jsonUrls: [
                'data/products.json',           // Mismo nivel
                '../data/products.json',          // Un nivel arriba
                './data/products.json',           // Explicito relativo
                '/data/products.json',            // Raíz absoluta
                'products.json'                   // Directo
            ]
        };
        
        let productos = [];
        let categorias = [];
        let categoriaActiva = 'todos';
        let productosFiltrados = [];
        
        // ==========================================
        // CARGAR DATOS - CON MÚLTIPLES INTENTOS
        // ==========================================
        
        async function cargarDatos() {
            const debugDiv = document.getElementById('debugInfo');
            let ultimoError = '';
            
            // Intentar cada URL posible
            for (let url of CONFIG.jsonUrls) {
                try {
                    console.log('Intentando cargar:', url);
                    const response = await fetch(url, {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json',
                            'Cache-Control': 'no-cache'
                        }
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    
                    const data = await response.json();
                    console.log('Datos cargados exitosamente de:', url);
                    
                    productos = data.productos || [];
                    categorias = data.categorias || [];
                    
                    // Verificar URL params
                    const params = new URLSearchParams(window.location.search);
                    const catUrl = params.get('cat');
                    if (catUrl && categorias.some(c => c.id === catUrl)) {
                        categoriaActiva = catUrl;
                    }
                    
                    // Ocultar debug si todo bien
                    debugDiv.classList.add('hidden');
                    
                    // Renderizar todo
                    renderizarFiltros();
                    filtrarProductos();
                    actualizarContadorCarrito();
                    
                    return; // Éxito, salir de la función
                    
                } catch (error) {
                    console.warn('Falló:', url, error.message);
                    ultimoError = `URL: ${url} - Error: ${error.message}`;
                }
            }
            
            // Si llegamos aquí, todos los intentos fallaron
            console.error('Todos los intentos fallaron');
            mostrarErrorCarga(ultimoError);
        }
        
        function mostrarErrorCarga(errorDetalle) {
            const debugDiv = document.getElementById('debugInfo');
            const container = document.getElementById('productosGrid');
            
            // Mostrar info de debug
            debugDiv.textContent = `Error cargando datos. ${errorDetalle}. Verifica que el archivo products.json exista en la carpeta data/`;
            debugDiv.classList.remove('hidden');
            
            // Mostrar mensaje amigable
            container.innerHTML = `
                <div class="col-span-full text-center py-12">
                    <i class="fas fa-exclamation-circle text-6xl text-gray-300 mb-4"></i>
                    <h3 class="font-serif text-2xl text-gray-600 mb-2">No se pudo cargar el catálogo</h3>
                    <p class="text-gray-500 mb-4">El archivo de productos no se encuentra o hay un problema de conexión.</p>
                    <div class="space-y-2">
                        <button onclick="cargarDatos()" class="bg-sb-green text-white px-6 py-3 rounded-xl hover:bg-sb-green-light transition-colors">
                            <i class="fas fa-sync-alt mr-2"></i>Intentar de nuevo
                        </button>
                        <p class="text-sm text-gray-400">O verifica que existe el archivo <code>data/products.json</code></p>
                    </div>
                </div>
            `;
            
            document.getElementById('contadorResultados').textContent = 'Error de carga';
        }
        
        // ==========================================
        // RENDERIZAR FILTROS
        // ==========================================
        
        function renderizarFiltros() {
            const container = document.getElementById('filtrosCategoria');
            const btnTodos = document.getElementById('btn-todos');
            
            // Limpiar botones anteriores excepto "Todos"
            const existentes = container.querySelectorAll('.filtro-dinamico');
            existentes.forEach(e => e.remove());
            
            // Agregar categorías
            const activas = categorias.filter(c => c.activa !== false);
            
            activas.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `filtro-btn filtro-dinamico px-6 py-3 rounded-full border-2 border-gray-200 text-gray-700 font-medium whitespace-nowrap transition-all hover:border-sb-green hover:text-sb-green`;
                btn.id = `btn-${cat.id}`;
                btn.onclick = () => setCategoria(cat.id);
                btn.innerHTML = `${cat.icono || '🌸'} ${cat.nombre}`;
                container.appendChild(btn);
            });
            
            // Marcar activo
            actualizarBotonActivo();
        }
        
        function setCategoria(cat) {
            categoriaActiva = cat;
            actualizarBotonActivo();
            filtrarProductos();
            
            // Actualizar URL sin recargar
            const url = new URL(window.location);
            if (cat === 'todos') {
                url.searchParams.delete('cat');
            } else {
                url.searchParams.set('cat', cat);
            }
            window.history.pushState({}, '', url);
        }
        
        function actualizarBotonActivo() {
            // Quitar clase activa de todos
            document.querySelectorAll('.filtro-btn').forEach(btn => {
                btn.classList.remove('filtro-activo');
                btn.classList.add('border-gray-200', 'text-gray-700');
                btn.classList.remove('border-sb-green', 'bg-sb-green', 'text-white');
            });
            
            // Agregar a activo
            const btnActivo = document.getElementById(categoriaActiva === 'todos' ? 'btn-todos' : `btn-${categoriaActiva}`);
            if (btnActivo) {
                btnActivo.classList.add('filtro-activo');
                btnActivo.classList.remove('border-gray-200', 'text-gray-700', 'hover:border-sb-green', 'hover:text-sb-green');
            }
        }
        
        // ==========================================
        // FILTRAR Y MOSTRAR PRODUCTOS
        // ==========================================
        
        function filtrarProductos() {
            const busqueda = document.getElementById('busqueda').value.toLowerCase().trim();
            const orden = document.getElementById('ordenar').value;
            
            // Filtrar
            productosFiltrados = productos.filter(p => {
                // Solo activos
                if (p.activo === false) return false;
                
                // Filtro categoría
                const coincideCategoria = categoriaActiva === 'todos' || p.categoria === categoriaActiva;
                
                // Filtro búsqueda
                const coincideBusqueda = !busqueda || 
                    (p.nombre && p.nombre.toLowerCase().includes(busqueda)) || 
                    (p.descripcion && p.descripcion.toLowerCase().includes(busqueda)) ||
                    (p.categoria && p.categoria.toLowerCase().includes(busqueda)) ||
                    (p.codigo && p.codigo.toLowerCase().includes(busqueda));
                
                return coincideCategoria && coincideBusqueda;
            });
            
            // Ordenar
            switch(orden) {
                case 'precio-menor':
                    productosFiltrados.sort((a, b) => getPrecioFinal(a) - getPrecioFinal(b));
                    break;
                case 'precio-mayor':
                    productosFiltrados.sort((a, b) => getPrecioFinal(b) - getPrecioFinal(a));
                    break;
                case 'nombre':
                    productosFiltrados.sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));
                    break;
                default:
                    // Relevancia: destacados primero, luego por ID
                    productosFiltrados.sort((a, b) => {
                        if (a.destacado && !b.destacado) return -1;
                        if (!a.destacado && b.destacado) return 1;
                        return (b.id || 0) - (a.id || 0);
                    });
            }
            
            renderizarProductos();
        }
        
        function getPrecioFinal(producto) {
            if (!producto) return 0;
            // Si tiene precio temporada activo, usar ese
            if (producto.precioTemporadaActivo && producto.precioTemporada) {
                return parseInt(producto.precioTemporada);
            }
            return parseInt(producto.precioRegular) || 0;
        }
        
        function renderizarProductos() {
            const container = document.getElementById('productosGrid');
            const contador = document.getElementById('contadorResultados');
            const sinResultados = document.getElementById('sinResultados');
            
            // Actualizar contador
            const total = productosFiltrados.length;
            contador.textContent = total === 1 ? '1 producto encontrado' : `${total} productos encontrados`;
            
            // Mostrar/ocultar mensaje sin resultados
            if (total === 0) {
                container.innerHTML = '';
                sinResultados.classList.remove('hidden');
                return;
            }
            
            sinResultados.classList.add('hidden');
            
            // Renderizar grid
            container.innerHTML = productosFiltrados.map(p => {
                const precio = getPrecioFinal(p);
                const precioOriginal = p.precioRegular && p.precioTemporadaActivo && p.precioTemporada 
                    ? parseInt(p.precioRegular) 
                    : null;
                
                const imagen = p.imagenes && p.imagenes.length > 0 
                    ? p.imagenes[0] 
                    : 'https://via.placeholder.com/400x400?text=Sin+Imagen';
                
                const esOferta = p.precioTemporadaActivo && p.precioTemporada;
                
                return `
                    <div class="product-card bg-white rounded-2xl overflow-hidden shadow-md">
                        <div class="relative aspect-square overflow-hidden bg-gray-100">
                            <img src="${imagen}" 
                                 alt="${p.nombre || 'Producto'}" 
                                 class="w-full h-full object-cover hover:scale-105 transition-transform duration-500"
                                 onerror="this.src='https://via.placeholder.com/400x400?text=Error+Imagen'"
                                 loading="lazy">
                            
                            ${esOferta ? `
                                <span class="absolute top-3 left-3 bg-sb-rose text-white px-3 py-1 rounded-full text-xs font-bold shadow-lg">
                                    OFERTA
                                </span>
                            ` : ''}
                            
                            ${p.destacado ? `
                                <span class="absolute top-3 right-3 bg-sb-gold text-sb-dark px-3 py-1 rounded-full text-xs font-bold shadow-lg">
                                    ⭐ Destacado
                                </span>
                            ` : ''}
                            
                            <!-- Overlay hover -->
                            <div class="absolute inset-0 bg-black/0 hover:bg-black/30 transition-all duration-300 flex items-center justify-center opacity-0 hover:opacity-100">
                                <a href="producto.html?id=${p.id}" class="bg-white text-sb-dark px-6 py-3 rounded-full font-medium transform translate-y-4 hover:translate-y-0 transition-all duration-300 shadow-lg hover:shadow-xl">
                                    Ver detalle
                                </a>
                            </div>
                        </div>
                        
                        <div class="p-5">
                            <div class="flex items-center gap-2 mb-2">
                                <span class="text-xs font-semibold text-sb-green uppercase tracking-wider bg-sb-green/10 px-2 py-1 rounded">
                                    ${p.categoria || 'General'}
                                </span>
                                <span class="text-xs text-gray-400">Stock: ${p.stock || 0}</span>
                            </div>
                            
                            <h4 class="font-serif text-lg text-sb-dark mb-2 line-clamp-2 leading-tight">
                                ${p.nombre || 'Sin nombre'}
                            </h4>
                            
                            <p class="text-gray-600 text-sm mb-4 line-clamp-2">
                                ${p.descripcion || ''}
                            </p>
                            
                            <div class="flex items-baseline gap-2 mb-4">
                                <span class="text-2xl font-bold text-sb-green">
                                    ₡${precio.toLocaleString('es-CR')}
                                </span>
                                ${precioOriginal ? `
                                    <span class="text-sm text-gray-400 line-through">
                                        ₡${precioOriginal.toLocaleString('es-CR')}
                                    </span>
                                    <span class="text-xs text-sb-rose font-semibold">
                                        -${Math.round((1 - precio/precioOriginal)*100)}%
                                    </span>
                                ` : ''}
                            </div>
                            
                            <button onclick="agregarAlCarrito(${p.id})" 
                                    class="w-full bg-sb-green hover:bg-sb-green-light text-white py-3.5 rounded-xl font-semibold transition-all duration-200 flex items-center justify-center gap-2 active:scale-95">
                                <i class="fas fa-shopping-bag"></i>
                                <span>Agregar al carrito</span>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function resetearFiltros() {
            document.getElementById('busqueda').value = '';
            setCategoria('todos');
        }
        
        // ==========================================
        // CARRITO - LOCALSTORAGE (FUNCIONA ENTRE PÁGINAS)
        // ==========================================
        
        function agregarAlCarrito(productoId) {
            const producto = productos.find(p => p.id === productoId);
            if (!producto) {
                console.error('Producto no encontrado:', productoId);
                return;
            }
            
            // Obtener carrito actual (localStorage persiste entre páginas)
            let carrito = JSON.parse(localStorage.getItem('sb_carrito') || '[]');
            
            const existente = carrito.find(item => item.id === productoId);
            
            if (existente) {
                existente.cantidad++;
                existente.subtotal = existente.precio * existente.cantidad;
            } else {
                const precio = getPrecioFinal(producto);
                carrito.push({
                    id: producto.id,
                    nombre: producto.nombre,
                    precio: precio,
                    precioUnitario: precio,
                    imagen: producto.imagenes?.[0] || '',
                    cantidad: 1,
                    subtotal: precio
                });
            }
            
            // Guardar en localStorage
            localStorage.setItem('sb_carrito', JSON.stringify(carrito));
            
            // Actualizar UI
            actualizarContadorCarrito();
            
            // Feedback visual
            const btn = event.target.closest('button');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> ¡Agregado!';
            btn.classList.add('bg-green-600');
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = originalHTML;
                btn.classList.remove('bg-green-600');
                btn.disabled = false;
            }, 1500);
            
            // Opcional: mostrar toast
            mostrarToast(`${producto.nombre} agregado al carrito`);
        }
        
        function actualizarContadorCarrito() {
            const carrito = JSON.parse(localStorage.getItem('sb_carrito') || '[]');
            const total = carrito.reduce((sum, item) => sum + item.cantidad, 0);
            
            const badge = document.getElementById('cartCount');
            
            if (total > 0) {
                badge.textContent = total;
                badge.classList.remove('opacity-0');
                badge.classList.add('opacity-100');
            } else {
                badge.classList.remove('opacity-100');
                badge.classList.add('opacity-0');
            }
        }
        
        function mostrarToast(mensaje) {
            // Crear toast si no existe
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                toast.className = 'fixed bottom-24 left-1/2 -translate-x-1/2 bg-sb-dark text-white px-6 py-3 rounded-full shadow-lg z-50 transform translate-y-20 opacity-0 transition-all duration-300';
                document.body.appendChild(toast);
            }
            
            toast.textContent = mensaje;
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }
        
        // ==========================================
        // UTILIDADES
        // ==========================================
        
        function toggleMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.classList.toggle('hidden');
        }
        
        // Header scroll effect
        window.addEventListener('scroll', () => {
            const header = document.getElementById('header');
            if (window.scrollY > 50) {
                header.classList.add('shadow-md');
            } else {
                header.classList.remove('shadow-md');
            }
        });
        
        // Inicializar al cargar
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Catálogo iniciando...');
            cargarDatos();
        });
    </script>
</body>
</html>
