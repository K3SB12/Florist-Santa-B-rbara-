<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito | Floristería Santa Bárbara</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="font-sans bg-gray-50 text-gray-900 min-h-screen">
    
    <!-- Header -->
    <header class="bg-white shadow-sm">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2">
                <span class="text-2xl">🌸</span>
                <span class="font-serif text-xl font-bold text-green-800">Santa Bárbara</span>
            </a>
            <a href="catalogo.html" class="text-gray-600 hover:text-green-800">
                ← Seguir comprando
            </a>
        </div>
    </header>

    <!-- Main -->
    <main class="max-w-4xl mx-auto px-4 py-8">
        <h1 class="font-serif text-3xl mb-6">Tu Carrito</h1>
        
        <!-- Vacío -->
        <div id="vacio" class="hidden text-center py-12">
            <i class="fas fa-shopping-bag text-6xl text-gray-300 mb-4"></i>
            <p class="text-gray-500 mb-4">Tu carrito está vacío</p>
            <a href="catalogo.html" class="bg-green-800 text-white px-6 py-3 rounded-lg inline-block">Ver catálogo</a>
        </div>
        
        <!-- Con items -->
        <div id="conItems" class="hidden">
            <div id="items" class="space-y-4 mb-6"></div>
            
            <div class="bg-white rounded-xl shadow-md p-6">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-lg font-semibold">Total:</span>
                    <span id="total" class="text-3xl font-bold text-green-800">₡0</span>
                </div>
                
                <div class="flex gap-4">
                    <button onclick="vaciar()" class="flex-1 py-3 border-2 border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
                        Vaciar
                    </button>
                    <a href="checkout.html" class="flex-1 bg-green-800 text-white py-3 rounded-lg text-center font-semibold hover:bg-green-700">
                        Pagar →
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script>
        const CARRITO_KEY = 'sb_carrito';
        
        function cargar() {
            const carrito = JSON.parse(localStorage.getItem(CARRITO_KEY) || '[]');
            
            if (carrito.length === 0) {
                document.getElementById('vacio').classList.remove('hidden');
                document.getElementById('conItems').classList.add('hidden');
                return;
            }
            
            document.getElementById('vacio').classList.add('hidden');
            document.getElementById('conItems').classList.remove('hidden');
            
            // Renderizar items
            document.getElementById('items').innerHTML = carrito.map((item, i) => `
                <div class="bg-white rounded-xl shadow-sm p-4 flex gap-4">
                    <img src="${item.imagen}" class="w-20 h-20 object-cover rounded-lg" onerror="this.src='https://via.placeholder.com/100'">
                    <div class="flex-1">
                        <h3 class="font-semibold">${item.nombre}</h3>
                        <p class="text-green-800 font-semibold">₡${item.precioUnitario.toLocaleString()} c/u</p>
                        
                        <div class="flex items-center gap-4 mt-2">
                            <div class="flex items-center border rounded">
                                <button onclick="cambiar(${i}, -1)" class="px-3 py-1 hover:bg-gray-100">-</button>
                                <span class="px-3 py-1 font-medium">${item.cantidad}</span>
                                <button onclick="cambiar(${i}, 1)" class="px-3 py-1 hover:bg-gray-100">+</button>
                            </div>
                            <span class="font-bold">₡${item.subtotal.toLocaleString()}</span>
                            <button onclick="eliminar(${i})" class="ml-auto text-red-500 hover:text-red-700">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // Total
            const total = carrito.reduce((sum, item) => sum + item.subtotal, 0);
            document.getElementById('total').textContent = '₡' + total.toLocaleString();
        }
        
        function cambiar(index, delta) {
            let carrito = JSON.parse(localStorage.getItem(CARRITO_KEY));
            carrito[index].cantidad += delta;
            
            if (carrito[index].cantidad <= 0) {
                carrito.splice(index, 1);
            } else {
                carrito[index].subtotal = carrito[index].cantidad * carrito[index].precioUnitario;
            }
            
            localStorage.setItem(CARRITO_KEY, JSON.stringify(carrito));
            cargar();
        }
        
        function eliminar(index) {
            if (!confirm('¿Eliminar?')) return;
            let carrito = JSON.parse(localStorage.getItem(CARRITO_KEY));
            carrito.splice(index, 1);
            localStorage.setItem(CARRITO_KEY, JSON.stringify(carrito));
            cargar();
        }
        
        function vaciar() {
            if (!confirm('¿Vaciar todo?')) return;
            localStorage.removeItem(CARRITO_KEY);
            cargar();
        }
        
        // Cargar al iniciar
        document.addEventListener('DOMContentLoaded', cargar);
    </script>
</body>
</html>
